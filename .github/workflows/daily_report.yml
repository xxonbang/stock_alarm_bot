name: Daily Stock Report

on:
  schedule:
    # 하루 2회 발송
    # KST 08:00 -> UTC 23:00 (전날)
    - cron: "0 23 * * *"
    # KST 22:00 -> UTC 13:00
    - cron: "0 13 * * *"
  workflow_dispatch: # 수동 실행도 가능

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Cache KIS API Token
        uses: actions/cache@v4
        with:
          path: .cache
          key: kis-token-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            kis-token-${{ runner.os }}-

      - name: Run Stock Insight Bot
        env:
          # 실행 트리거 타입 (schedule: 자동, workflow_dispatch: 수동)
          TRIGGER_TYPE: ${{ github.event_name }}
          # 필수 환경 변수
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GOOGLE_API_KEY_01: ${{ secrets.GOOGLE_API_KEY_01 }}
          GOOGLE_API_KEY_02: ${{ secrets.GOOGLE_API_KEY_02 }}
          GOOGLE_API_KEY_03: ${{ secrets.GOOGLE_API_KEY_03 }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # 한국 주식 API
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_API_KEY_EXPIRY: ${{ secrets.KRX_API_KEY_EXPIRY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          # 미국 주식 Fallback API (선택적)
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # Supabase (KIS 토큰 공유용)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python src/main.py
